apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "prometheus.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'patient'
        static_configs:
          - targets: ['patient:5000']
      - job_name: 'appointment'
        static_configs:
          - targets: ['appointment:5001']
      - job_name: 'doctor'
        static_configs:
          - targets: ['doctor:5002']